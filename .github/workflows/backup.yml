name: Database Backup

on:
  schedule:
    - cron: '0 2 * * *'   # every day at 2:00 AM UTC
  workflow_dispatch:        # allow manual trigger

jobs:
  backup:
    name: Backup SQLite Database
    runs-on: ubuntu-latest

    steps:
      - name: Get Github action IP
        id: ip
        uses: haythem/public-ip@v1.3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Add GitHub IP to AWS Security Group
        run: |
          aws ec2 authorize-security-group-ingress \
            --group-id ${{ secrets.AWS_SG_ID }} \
            --protocol tcp \
            --port 22 \
            --cidr ${{ steps.ip.outputs.ipv4 }}/32

      - name: Download database from server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_IP }}
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            BACKUP_DIR=/var/www/mudhiyan/server/data/backups
            mkdir -p $BACKUP_DIR
            cp /var/www/mudhiyan/server/data/workshop.db \
               $BACKUP_DIR/workshop-$(date +%Y%m%d-%H%M%S).db
            # Keep only last 30 backups
            ls -t $BACKUP_DIR/*.db | tail -n +31 | xargs -r rm

      - name: Copy backup to runner
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_IP }}
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: /var/www/mudhiyan/server/data/backups/
          target: ./db-backup
          strip_components: 7

      - name: Upload backup as artifact
        uses: actions/upload-artifact@v4
        with:
          name: db-backup-${{ github.run_id }}
          path: db-backup/*.db
          retention-days: 30

      - name: Remove GitHub IP from AWS Security Group
        if: always()
        run: |
          aws ec2 revoke-security-group-ingress \
            --group-id ${{ secrets.AWS_SG_ID }} \
            --protocol tcp \
            --port 22 \
            --cidr ${{ steps.ip.outputs.ipv4 }}/32
